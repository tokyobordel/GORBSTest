<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ИН100ГРАММ</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header class="header">
            <div class="container header-content">
                <h1 class="logo">ИН100ГРАММ</h1>
                <nav class="nav">
                    <div id="guestButtons">
                        <button id="btnSignin" class="btn btn-outline">Войти</button>
                        <button id="btnSignup" class="btn btn-primary">Регистрация</button>
                    </div>
                    <!-- Блок авторизованного пользователя (изначально скрыт) -->
                    <div id="userBlock" style="display: none;">
                        <span id="userNameDisplay" class="user-name"></span>
                        <button id="btnLogout" class="btn btn-outline">Выйти</button>
                        <button id="btnUpload" class="btn btn-outline">Загрузка изображений</button> 
                    </div>
                    <button id="allPostsBtn" class="btn btn-outline" style="display: none;">Все посты</button>
                </nav>
            </div>
        </header>

        <main class="main">
            <div class="container">
                <div id="feedContainer" class="feed">
                </div>
                <div id="feedLoader" style="text-align: center; padding: 2rem; display: none;">
                    Загрузка...
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container">
                <p>Нам этот ваш ин100грамм нафиг не нужОн © 2026</p>
            </div>
        </footer>

        <!-- Модальное окно входа -->
        <div id="signinModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Вход</h2>
                <form id="signinForm">
                    <div class="form-group">
                        <label for="signinUsername">Логин</label>
                        <input type="text" id="signinUsername" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="signinPassword">Пароль</label>
                        <input type="password" id="signinPassword" name="password" required>
                    </div>
                    <div id="signinError" class="error-message"></div>
                    <button type="submit" class="btn btn-primary btn-block">Войти</button>
                </form>
                <p class="switch-form">Нет аккаунта? <a href="#" id="switchToSignup">Зарегистрироваться</a></p>
            </div>
        </div>

        <!-- Модальное окно регистрации -->
        <div id="signupModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Регистрация</h2>
                <form id="signupForm">
                    <div class="form-group">
                        <label for="signupUsername">Логин</label>
                        <input type="text" id="signupUsername" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="signupEmail">Email</label>
                        <input type="email" id="signupEmail" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="signupPassword">Пароль</label>
                        <input type="password" id="signupPassword" name="password" required>
                    </div>
                    <div class="form-group">
                        <label for="signupConfirm">Повторите пароль</label>
                        <input type="password" id="signupConfirm" name="confirm" required>
                    </div>
                    <div class="form-group">
                        <label for="signupTg">Telegram Chat ID (необязательно)</label>
                        <input type="text" id="signupTg" name="tg_chat_id">
                    </div>
                    <div id="signupError" class="error-message"></div>
                    <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
                </form>
                <p class="switch-form">Уже есть аккаунт? <a href="#" id="switchToSignin">Войти</a></p>
            </div>
        </div>

        <!-- Модальное окно загрузки изображений -->
        <div id="uploadModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Загрузить изображения</h2>
                <form id="uploadForm">
                    <div class="form-group">
                        <label for="fileInput">Выберите до 3 изображений (макс. 2 МБ каждое)</label>
                        <input type="file" id="fileInput" name="images" accept="image/*" multiple required>
                        <div id="fileList" class="file-list"></div>
                    </div>
                    <div id="uploadError" class="error-message"></div>
                    <button type="submit" class="btn btn-primary btn-block">Загрузить</button>
                </form>
            </div>
        </div>

        <script src="index.js"></script>
        <script src="upload.js"></script>
        <script src="feed.js"></script>
    </body>
</html>
